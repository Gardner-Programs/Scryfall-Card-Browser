[tool.pytest.ini_options]
testpaths = ["tests"]
# Flat modules at the repo root.
pythonpath = ["."]
addopts = "-ra"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: import sorting. E501 (line length) is
# ignored — long URL/UI strings aren't worth wrapping.
select = ["E", "F", "I", "W"]
ignore = ["E501"]
